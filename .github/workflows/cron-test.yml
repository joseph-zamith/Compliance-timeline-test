name: Cron test (déclenchement automatique sans action humaine — à supprimer après test)

on:
  workflow_dispatch: {}
  schedule:
    # Ponctuel : 16:40 CEST le 23 juillet 2026 (= 14:40 UTC). Cron GitHub
    # Actions est toujours en UTC. Comme day-of-month et month sont fixés,
    # ça ne se redéclenchera pas avant le 23 juillet 2027 — pas besoin de
    # le désactiver en urgence après le test, mais à supprimer une fois validé.
    - cron: "40 14 23 7 *"

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer un mail de test
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import os, smtplib
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          body = (
              'Ceci est un test du declenchement automatique GitHub Actions '
              '(schedule: cron), sans aucune action humaine.\n\n'
              f'Heure UTC au moment de l ecriture du mail : {datetime.now(timezone.utc).isoformat()}\n\n'
              'Si tu recois ce mail sans avoir rien clique, le mecanisme de cron '
              'marche et on peut activer le vrai cron hebdomadaire en confiance.'
          )
          msg = MIMEText(body)
          msg['Subject'] = 'Test cron GitHub Actions — Compliance-timeline'
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['GMAIL_ADDRESS']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          print('Email de test envoye.')
          "
